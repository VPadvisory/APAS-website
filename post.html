<!DOCTYPE html>
<html>
<head>
  <title>Blog Post</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
    }

    .date {
      color: gray;
      margin-bottom: 15px;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin: 15px 0;
    }

    .content {
      line-height: 1.6;
      color: #333;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: blue;
    }
  </style>
</head>

<body>

<div class="container" id="post"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT6VDCrZ15pMJ4l2OMogmq-73ROo4cA_owLtL8jDc3GJF6HIJRLLpTqtxC6RN4z7x0q6q3R1oRE88RF/pub?output=tsv";

const params = new URLSearchParams(window.location.search);
const postId = params.get("id");

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    const postDiv = document.getElementById("post");

    rows.forEach(row => {
      const cols = row.split("\t");

      const id = cols[0]?.trim();

      if (id === postId) {
        const title = cols[1]?.trim() || "";
        const content = cols[2]?.trim() || "";
        const date = cols[3]?.trim() || "";
        const image = cols[4]?.trim() || "";

        postDiv.innerHTML = `
          <h1>${title}</h1>
          <div class="date">${date}</div>
          ${image ? `<img src="${image}" />` : ""}
          <div class="content">${content.replace(/\n/g, "<br>")}</div>
          <a href="news.html">← Back to Blogs</a>
        `;
      }
    });
  });
</script>

</body>
</html>
